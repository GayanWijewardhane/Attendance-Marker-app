<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Attendance Marker - Network Engineer</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"
    integrity="sha512-wC/cunGGDjXSl9OHsu0040D9qwCwP81jt8aB15k+012E2E6fOSlKqQxRYsBfE60S0ZqBPEH0Wn8+28/1d3b0QA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>

  <!-- 3D Animated Background Elements -->
  <div class="cube-container">
    <div class="cube cube-1">
      <div class="face front"></div>
      <div class="face back"></div>
      <div class="face right"></div>
      <div class="face left"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
    <div class="cube cube-2">
      <div class="face front"></div>
      <div class="face back"></div>
      <div class="face right"></div>
      <div class="face left"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
  </div>

  <header>
    <div class="header-left">
      <h1>Attendance Marker</h1>
      <span class="subtitle">Network Engineer</span>
    </div>
    <div class="header-right">
      <div class="sync-status" id="syncStatus">Synced</div>
      <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- Monthly Summary Bar -->
  <section class="month-summary glass-panel" id="monthSummary">
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()">&lt;</button>
      <h2 id="currentMonth">February 2026</h2>
      <button class="nav-btn" onclick="nextMonth()">&gt;</button>
    </div>
    <div class="stats-row">
      <div class="stat present-stat tilt-element" data-tilt data-tilt-max="15" data-tilt-speed="400"
        data-tilt-glare="true" data-tilt-max-glare="0.5">
        <span class="stat-count" id="presentCount">0</span>
        <span class="stat-label">Present</span>
      </div>
      <div class="stat absent-stat tilt-element" data-tilt data-tilt-max="15" data-tilt-speed="400"
        data-tilt-glare="true" data-tilt-max-glare="0.5">
        <span class="stat-count" id="absentCount">0</span>
        <span class="stat-label">Absent</span>
      </div>
      <div class="stat holiday-stat tilt-element" data-tilt data-tilt-max="15" data-tilt-speed="400"
        data-tilt-glare="true" data-tilt-max-glare="0.5">
        <span class="stat-count" id="holidayCount">0</span>
        <span class="stat-label">Holiday</span>
      </div>
      <div class="stat total-stat tilt-element" data-tilt data-tilt-max="15" data-tilt-speed="400"
        data-tilt-glare="true" data-tilt-max-glare="0.5">
        <span class="stat-count" id="totalDays">0</span>
        <span class="stat-label">Total</span>
      </div>
    </div>
  </section>

  <!-- Mark Attendance Form -->
  <section class="mark-section">
    <h2 id="formTitle">Mark Attendance</h2>
    <form id="attendanceForm" onsubmit="handleSubmit(event)">
      <input type="hidden" id="editId" value="">

      <div class="attendance-form glass-panel tilt-element" data-tilt data-tilt-max="5" data-tilt-speed="1000"
        data-tilt-glare="true" data-tilt-max-glare="0.2">
        <!-- Date -->
        <div class="form-group">
          <label for="attDate">Date *</label>
          <input type="date" id="attDate" required>
        </div>

        <!-- Status - Big buttons -->
        <div class="form-group">
          <label>Attendance *</label>
          <div class="status-buttons">
            <button type="button" class="status-btn present" onclick="selectStatus('Present')"
              id="btnPresent">Present</button>
            <button type="button" class="status-btn absent" onclick="selectStatus('Absent')"
              id="btnAbsent">Absent</button>
            <button type="button" class="status-btn holiday" onclick="selectStatus('Holiday')"
              id="btnHoliday">Holiday</button>
          </div>
          <input type="hidden" id="attStatus" required>
        </div>

        <!-- Tasks -->
        <div class="form-group">
          <label for="attTask">Tasks / Work Done *</label>
          <textarea id="attTask" rows="3"
            placeholder="e.g. Configured VLAN 100 on SW-CORE-01, Updated firewall rules..." required></textarea>
        </div>

        <!-- Assigned By -->
        <div class="form-group">
          <label for="attAssignedBy">Assigned By *</label>
          <input type="text" id="attAssignedBy" placeholder="e.g. Manager name / Team Lead" required>
        </div>

        <!-- Notes -->
        <div class="form-group">
          <label for="attNotes">Notes (optional)</label>
          <input type="text" id="attNotes" placeholder="Any additional remarks...">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">Mark Attendance</button>
        <button type="button" class="btn btn-cancel" onclick="cancelEdit()" id="cancelBtn"
          style="display:none">Cancel</button>
      </div>
    </form>
  </section>

  <!-- Attendance Records -->
  <section class="records-section">
    <div class="records-header">
      <h2>Attendance Records</h2>
      <div class="filter-row">
        <select id="filterStatus" onchange="loadRecords()">
          <option value="">All</option>
          <option value="Present">Present</option>
          <option value="Absent">Absent</option>
          <option value="Holiday">Holiday</option>
        </select>
        <button class="btn btn-primary" onclick="downloadCSV()">Download CSV</button>
      </div>
    </div>

    <!-- Desktop Table -->
    <div class="table-wrap glass-panel tilt-element" data-tilt data-tilt-max="2" data-tilt-speed="1000"
      data-tilt-perspective="1500" data-tilt-glare="true" data-tilt-max-glare="0.1">
      <table id="recordsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Status</th>
            <th>Tasks</th>
            <th>Assigned By</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recordsBody">
          <tr>
            <td colspan="6" class="empty-msg">No records yet. Mark your attendance above.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Mobile Cards -->
    <div class="cards-wrap" id="cardsWrap"></div>
  </section>

  <footer>
    <p>Attendance Marker | Auto-syncs across all devices every 5s</p>
  </footer>

  <script src="/js/app.js"></script>
</body>

</html>
